services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    expose:
      - "80"
    volumes:
      - ./backend/src:/var/www/html/src:ro
      - ./backend/config:/var/www/html/config:ro
    environment:
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: app
      DB_USER: app
      DB_PASS: secret
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    expose:
      - "5173"
    environment:
      VITE_API_URL: ""
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
      - ai

  ai:
    build: ./ai
    ports:
      - "3000:3000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TASKS_API_BASE_URL: http://api
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.7}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      LMSTUDIO_MODEL: ${LMSTUDIO_MODEL:-local-model}
      LMSTUDIO_API_KEY: ${LMSTUDIO_API_KEY:-lm-studio}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/ping').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - ./ai/src:/app/src:ro
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
      - ai

volumes:
  db_data:
