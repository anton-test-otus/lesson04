services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    expose:
      - "80"
    volumes:
      - ./backend/src:/var/www/html/src:ro
      - ./backend/config:/var/www/html/config:ro
    environment:
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: app
      DB_USER: app
      DB_PASS: secret
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    expose:
      - "5173"
    environment:
      VITE_API_URL: ""
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  db_data:
